<style>

body{
  margin:0;
  font-family:Arial;
  background:#f5f7fa;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#1f6f78,#3fa7b3);
  color:white;
  text-align:center;
  padding:60px 20px;
}

.btn{
  display:inline-block;
  background:#25D366;
  color:white;
  padding:12px 20px;
  margin-top:15px;
  text-decoration:none;
  border-radius:30px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:40px;
}

/* CARD */
.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.card button{
  margin:10px;
  padding:10px;
  border:none;
  background:#1f6f78;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  z-index:1000;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  color:white;
  font-size:30px;
  cursor:pointer;
}

/* FOOTER */
.footer{
  background:#1f6f78;
  color:white;
  text-align:center;
  padding:20px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
}

</style>
</head>
